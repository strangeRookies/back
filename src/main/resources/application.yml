spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: strange-back
  datasource:
    #AWS RDS 엔드포인트 주소 적용 완료
    url: ${DB_URL:jdbc:postgresql://smart-safety-db-new.cleq04iqogz6.ap-northeast-2.rds.amazonaws.com:5432/postgres?sslmode=require}
    username: ${DB_USERNAME:postgres}
    # 비밀번호는 깃허브에 올리지 않고 EKS Secret에서 주입받습니다 (보안 유지)
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show-sql: ${JPA_SHOW_SQL:false}
        format_sql: ${JPA_FORMAT_SQL:false}
        jdbc:
          time_zone: UTC
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  data:
    redis:
      # EC2 내부망(프라이빗 IP) 주소 적용 완료
      host: ${REDIS_HOST:10.0.1.84}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: ${REDIS_TIMEOUT:3s}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:1800000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:1209600000}

auth:
  refresh-token-cookie:
    name: ${REFRESH_TOKEN_COOKIE_NAME:REFRESH_TOKEN}
    secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}
    same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
    path: ${REFRESH_TOKEN_COOKIE_PATH:/api/auth}

mqtt:
  # 확인된 공통 EC2 서버 IP 적용 완료
  host: ${MQTT_HOST:15.165.248.37}
  port: ${MQTT_PORT:1883}
  broker-url: tcp://${MQTT_HOST:15.165.248.37}:${MQTT_PORT:1883}
  client-id: spring-backend-${random.uuid}
  topic: ${MQTT_TOPIC:event}
  camera-status-topic: ${MQTT_CAMERA_STATUS_TOPIC:safety/cameras/status}
  overlay-topic: ${MQTT_OVERLAY_TOPIC:camera}
  overlay-publish-interval-ms: ${MQTT_OVERLAY_PUBLISH_INTERVAL_MS:125}
  overlay-stale-after-ms: ${MQTT_OVERLAY_STALE_AFTER_MS:2000}
  reconnect-delay-ms: ${MQTT_RECONNECT_DELAY_MS:5000}
  initial-connect-delay-ms: ${MQTT_INITIAL_CONNECT_DELAY_MS:1000}

sms:
  enabled: ${SMS_ENABLED:false}
  provider: ${SMS_PROVIDER:mock}
  cool-sms:
    api-key: ${COOLSMS_API_KEY:}
    api-secret: ${COOLSMS_API_SECRET:}
    from-number: ${COOLSMS_FROM_NUMBER:}
    timeout: ${COOLSMS_TIMEOUT:3s}
  message:
    verification-template: ${SMS_VERIFICATION_TEMPLATE:[Strange Safety] 인증번호는 {code}입니다.}
  rate-limit:
    resend-cooldown-seconds: ${SMS_RESEND_COOLDOWN_SECONDS:60}
    daily-limit-per-phone: ${SMS_DAILY_LIMIT_PER_PHONE:5}

app:
  cors:
    # 프론트엔드 S3 웹사이트 호스팅 주소 적용 완료
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://safety-web-dashboard-bucket.s3-website.ap-northeast-2.amazonaws.com}
  websocket:
    allowed-origin-patterns: ${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://safety-web-dashboard-bucket.s3-website.ap-northeast-2.amazonaws.com}
  aes:
    secret-key: ${AES_SECRET_KEY}
    iv: ${AES_IV}
  fcm:
    enabled: ${FCM_ENABLED:false}
    service-account-key: ${FCM_SERVICE_ACCOUNT_KEY_PATH:classpath:firebase-service-account.json}

logging:
  level:
    com.strange.safety: INFO

simulation:
  video:
    pool-path: ${SIMULATION_VIDEO_POOL_PATH:video_pool}
  rtsp:
    base-url: ${SIMULATION_RTSP_BASE_URL:rtsp://localhost:8554}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:safety-risk-media-bucket}
    region: ${AWS_S3_REGION:ap-northeast-2}

vlm:
  mock-mode: ${VLM_MOCK_MODE:true}
  scheduler-delay-ms: ${VLM_SCHEDULER_DELAY_MS:15000}
  batch-size: ${VLM_BATCH_SIZE:2}
  timeout-seconds: ${VLM_TIMEOUT_SECONDS:120}
  max-retries: ${VLM_MAX_RETRIES:3}
  prompt-version: ${VLM_PROMPT_VERSION:v1}
  model-name: ${VLM_MODEL_NAME:mock-vlm}
  python-executable: ${VLM_PYTHON_EXECUTABLE:python}
  process-script: ${VLM_PROCESS_SCRIPT:../strange_ai/scripts/process_vlm.py}
  gemini-api-key: ${GEMINI_API_KEY:}