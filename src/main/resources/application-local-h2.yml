# In-memory H2 for local bootRun when PostgreSQL is not running.
# Usage: set SPRING_PROFILES_ACTIVE=local-h2 (see scripts/bootRun_local_h2.bat)
spring:
  datasource:
    url: jdbc:h2:mem:strange_safety_dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration